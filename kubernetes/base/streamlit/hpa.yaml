apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: streamlit
  labels:
    app.kubernetes.io/name: streamlit
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: streamlit
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600   # Streamlit = sessions longues
