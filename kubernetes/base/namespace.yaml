apiVersion: v1
kind: Namespace
metadata:
  name: lyonflow
  labels:
    name: lyonflow
    app.kubernetes.io/part-of: lyonflowfull
    app.kubernetes.io/managed-by: kustomize
---
# NetworkPolicy : isolation par défaut, autorise ingress controller + intra-namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: lyonflow
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: lyonflow
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
