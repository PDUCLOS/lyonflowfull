# =============================================================================
# LyonFlowFull — Personas
# =============================================================================
# Cerveau de l'interface. Pilote l'affichage, l'auth, le routing et le thème
# selon le persona sélectionné.
#
# Pour ajouter un persona :
#   1. Ajouter un bloc sous `personas:`
#   2. Définir ses pages dans `navigation:`
#   3. Créer le mot de passe dans .env (PERSONA_<ID>_PASSWORD) si auth requise
#
# Convention de nommage des fichiers pages : <Persona>_<Ordre>_<Nom>.py
# Exemple : Usager_1_Mon_Trajet.py
# =============================================================================

version: "1.0"
last_updated: "2026-06-05"

default_persona: usager

# -----------------------------------------------------------------------------
# Personas
# -----------------------------------------------------------------------------
personas:

  # ---------------------------------------------------------------------------
  # 1. USAGER — Vue grand public
  # ---------------------------------------------------------------------------
  usager:
    id: usager
    label: "Usager"
    short_label: "Particulier"
    icon: "🌱"
    description: "Vue simplifiée pour les Lyonnais au quotidien"
    color_primary: "#4CAF50"
    color_accent: "#81C784"
    color_bg: "#0E1117"

    landing_page: "Usager_1_Mon_Trajet"

    access:
      auth_required: false
      password_env: null
      role: public

    default_filters:
      mode_transport: "all"
      horizon: "live"
      perimeter: "lyon_metropole"

    theme:
      density: "compact"
      show_kpi: false
      show_technical: false
      max_alerts_shown: 3
      refresh_interval_sec: 60

    hidden_widgets:
      - otp_heatmap
      - correlation_matrix
      - bottleneck_ranking
      - saeiv_export
      - scenario_painter
      - pdf_generator
      - benchmark_cities
      - line_kpis
      - export_pdf_button

  # ---------------------------------------------------------------------------
  # 2. PRO TCL — Control room
  # ---------------------------------------------------------------------------
  pro_tcl:
    id: pro_tcl
    label: "Pro TCL"
    short_label: "Opérateur réseau"
    icon: "🎛"
    description: "Control room pour la régulation et l'exploitation TCL"
    color_primary: "#FF9800"
    color_accent: "#FFB74D"
    color_bg: "#0E1117"

    landing_page: "Pro_1_PCC_Live"

    access:
      auth_required: true
      password_env: "PERSONA_PRO_TCL_PASSWORD"
      role: "tcl_operator"

    default_filters:
      mode_transport: "transit"
      horizon: "live"
      perimeter: "reseau_tcl"
      lines: []

    theme:
      density: "dense"
      show_kpi: true
      show_technical: true
      max_alerts_shown: 50
      refresh_interval_sec: 30

    hidden_widgets:
      - weather_widget
      - velov_widget
      - scenario_painter
      - pdf_generator
      - benchmark_cities
      - why_explainer

  # ---------------------------------------------------------------------------
  # 3. ÉLU — Vue exécutive
  # ---------------------------------------------------------------------------
  elu:
    id: elu
    label: "Élu"
    short_label: "Décideur Grand Lyon"
    icon: "🏛"
    description: "Vue exécutive et stratégique pour les décideurs Grand Lyon"
    color_primary: "#3F51B5"
    color_accent: "#5C6BC0"
    color_bg: "#0E1117"

    landing_page: "Elu_1_Synthese"

    access:
      auth_required: true
      password_env: "PERSONA_ELU_PASSWORD"
      role: "elu_grand_lyon"

    default_filters:
      mode_transport: "all"
      horizon: "month"
      perimeter: "lyon_metropole"

    theme:
      density: "normal"
      show_kpi: true
      show_technical: false
      max_alerts_shown: 0
      refresh_interval_sec: 300

    hidden_widgets:
      - alert_ticker
      - otp_heatmap
      - correlation_matrix
      - saeiv_export
      - why_explainer
      - velov_widget
      - weather_widget

