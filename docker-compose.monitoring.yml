# =============================================================================
# docker-compose.monitoring.yml — Stack monitoring (Sprint VPS-3)
# =============================================================================
# Override du docker-compose.yml principal. Usage :
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# Stack active :
#   - alertmanager (Discord/Slack webhook)
#   - grafana (dashboards provisionnés — affiche "no data" sans Prometheus)
#   - node-exporter (CPU, RAM, disk, load)
#   - postgres-exporter (PG connections, locks, queries)
#   - nginx-exporter (requests, 5xx, latency)
#
# Sprint 15+ (2026-06-19) : Prometheus + redis-exporter SUPPRIMÉS.
# - prometheus_data (35 MB) viré, prom/prometheus:v2.54.1 (386 MB) viré.
# - Les exporters (node/postgres/nginx) + grafana + alertmanager restent UP
#   mais sans source de données Prometheus → affichent "no data".
# - Stack monitoring à remettre en place si nécessaire (cf. SPEC monitoring v2).
#
# Ports exposés uniquement sur 127.0.0.1 (Nginx fait le reverse proxy public).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Prometheus — SUPPRIMÉ Sprint 15+ (2026-06-19)
  # Raison : config YAML cassée depuis v2.54 (restart-loop), valeur
  # ajoutée faible vs coût ops (1G RAM + 386 MB image + 35 MB volume).
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Alertmanager
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: lyonflow-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    environment:
      # Secrets webhook (definis dans .env sur le VPS)
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_CRITICAL_URL: ${ALERT_WEBHOOK_CRITICAL_URL:-}
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: lyonflow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${VPS_DOMAIN:-localhost}/grafana"
      # Auto-provisioning via /etc/grafana/provisioning/
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    # Sprint 15+ — dépendance prometheus virée. Grafana démarre standalone
    # et affiche "no data" tant que la stack monitoring v2 n'est pas remise.
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ---------------------------------------------------------------------------
  # Node exporter (host metrics)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: lyonflow-node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|var/lib/docker/.+)($$|/)'
    volumes:
      - /:/host:ro,rslave
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ---------------------------------------------------------------------------
  # PostgreSQL exporter
  # ---------------------------------------------------------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: lyonflow-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "127.0.0.1:9187:9187"
    # Sprint 15+ — dépendance prometheus virée. Exporter reste UP mais
    # sans target Prometheus pour le scrape.
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  # ---------------------------------------------------------------------------
  # Nginx exporter
  # ---------------------------------------------------------------------------
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: lyonflow-nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx:9113/stub_status'
    # Note : nécessite stub_status dans nginx.conf (ajouter location /stub_status { stub_status on; })
    ports:
      - "127.0.0.1:9113:9113"
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M

  # ---------------------------------------------------------------------------
  # Redis exporter — SUPPRIMÉ Sprint 15+ (2026-06-19)
  # Raison : Redis viré (cf. docker-compose.yml), exporter orphelin.
  # ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  # prometheus_data SUPPRIMÉ Sprint 15+ (avec le service prometheus)
  alertmanager_data:
  grafana_data:

# ---------------------------------------------------------------------------
# Networks (réutilise le réseau par défaut + monitoring pour isolation)
# ---------------------------------------------------------------------------
networks:
  default:
    name: lyonflow_default
  monitoring:
    name: lyonflow_monitoring
