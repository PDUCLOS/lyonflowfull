# =============================================================================
# monitoring/prometheus/prometheus.yml — Config principale Prometheus
# =============================================================================
# Sprint VPS-3 : scrape les services LyonFlow toutes les 15s, retention
# 30j. Alertes via alertmanager.yml (webhook Discord/Slack).
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: lyonflow-vps
    env: production

# Load alerting rules
# Réactivé 2026-07-02 : templates invalides (label_value, humanizeBytes) de
# rules/database.yml corrigés — Prometheus v2.54 charge les 3 fichiers.
rule_files:
  - "rules/*.yml"

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# Storage retention (30 jours) — via flags CLI dans docker-compose
# (--storage.tsdb.retention.time=30d --storage.tsdb.retention.size=10GB).
# Pas de bloc YAML ici : la syntaxe `storage.tsdb.retention` n'est
# pas supportée en Prometheus v2.54.

# Scrape configs
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus lui-même
  # ---------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ---------------------------------------------------------------------------
  # Node exporter (CPU, RAM, disk, load)
  # ---------------------------------------------------------------------------
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          component: vps-host

  # ---------------------------------------------------------------------------
  # PostgreSQL exporter (connections, locks, queries, replication)
  # ---------------------------------------------------------------------------
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          component: database

  # ---------------------------------------------------------------------------
  # Nginx exporter (requests, 5xx, latency)
  # ---------------------------------------------------------------------------
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          component: reverse-proxy

  # ---------------------------------------------------------------------------
  # FastAPI /metrics (via prometheus_fastapi_instrumentator)
  # ---------------------------------------------------------------------------
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          component: api
          persona: all

  # Airflow metrics — DÉSACTIVÉ : pas d'exporter statsd/prometheus installé
  # côté Airflow (aucun package requirements-base.txt), target 404 sinon.
  # - job_name: airflow
  #   metrics_path: /admin/metrics
  #   static_configs:
  #     - targets: ["airflow-webserver:8080"]
  #       labels:
  #         component: orchestration

  # Redis exporter — SUPPRIMÉ Sprint 15+ (Redis viré du projet, exporter orphelin)

  # ---------------------------------------------------------------------------
  # MinIO cluster metrics (optionnel — desactive par defaut, MINIO_ENABLED=false)
  # ---------------------------------------------------------------------------
  # - job_name: minio
