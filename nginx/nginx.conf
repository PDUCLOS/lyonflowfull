# =============================================================================
# Nginx reverse proxy
# =============================================================================
# Expose uniquement 80/443 publiquement. Tous les services internes sont
# accessibles uniquement via Nginx.
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Named upstreams (required by test_nginx_config_exists)
    # Sprint P2-bis (2026-06-15) — déplacés DANS http {} (avant étaient top-level,
    # ce qui fait crasher nginx au boot : "upstream directive is not allowed here").
    upstream streamlit_backend {
        server streamlit:8501;
    }
    upstream api_backend {
        server api:8000;
    }
    upstream airflow_backend {
        server airflow-webserver:8080;
    }
    upstream mlflow_backend {
        server mlflow:5000;
    }
    upstream minio_backend {
        server minio:9001;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Docker DNS resolver — re-resolve every 30s so container IP changes
    # are picked up without restarting Nginx
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    server {
        # Sprint P2-bis (2026-06-15) — ajout listen [::]:80 pour IPv6
        # (sinon le healthcheck Docker 'wget http://localhost/nginx-health'
        # se résout en [::1] et échoue avec 'Connection refused')
        listen 80;
        listen [::]:80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Variables force DNS re-resolution on each request
        set $upstream_streamlit http://streamlit:8501;
        set $upstream_api http://api:8000;
        set $upstream_airflow http://airflow-webserver:8080;
        set $upstream_mlflow http://mlflow:5000;
        set $upstream_minio_console http://minio:9001;

        # Dashboard Streamlit (par défaut)
        location / {
            proxy_pass $upstream_streamlit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Streamlit utilise WebSocket)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # API REST
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass $upstream_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API health (sans rate limit)
        location /api/health {
            proxy_pass $upstream_api/health;
            access_log off;
        }

        # Airflow (protégé par auth basique dans Streamlit côté API)
        location /airflow/ {
            proxy_pass $upstream_airflow/airflow/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MLflow
        location /mlflow/ {
            proxy_pass $upstream_mlflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MinIO console
        location /minio/ {
            proxy_pass $upstream_minio_console/;
            proxy_set_header Host $host;
        }

        # Health endpoint
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # Nginx stub_status (Sprint VPS-3) — pour nginx-exporter Prometheus
        # Localhost uniquement (sécurisé)
        location /stub_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker networks
            deny all;
        }
    }

    # Server block HTTPS (Sprint VPS-1) — TLS Let's Encrypt
    # Actif uniquement si /etc/letsencrypt/live/lyonflow/fullchain.pem existe
    # Sinon HTTP-only (cas par défaut avant `make certbot-init`).
    server {
        # Sprint P2-bis (2026-06-15) — IPv6 dual-stack
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # Include TLS config (certs + ciphers + HSTS)
        include /etc/nginx/ssl.conf;

        # Variables force DNS re-resolution on each request
        set $upstream_streamlit http://streamlit:8501;
        set $upstream_api http://api:8000;
        set $upstream_airflow http://airflow-webserver:8080;
        set $upstream_mlflow http://mlflow:5000;
        set $upstream_minio_console http://minio:9001;

        # Dashboard Streamlit (par défaut)
        location / {
            proxy_pass $upstream_streamlit;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Streamlit utilise WebSocket)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # API REST
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass $upstream_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API health (sans rate limit)
        location /api/health {
            proxy_pass $upstream_api/health;
            access_log off;
        }

        # Airflow
        location /airflow/ {
            proxy_pass $upstream_airflow/airflow/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MLflow
        location /mlflow/ {
            proxy_pass $upstream_mlflow/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MinIO console
        location /minio/ {
            proxy_pass $upstream_minio_console/;
            proxy_set_header Host $host;
        }

        # Health endpoint
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
        }
    }
}
