# =============================================================================
# nginx/ssl.conf — TLS Let's Encrypt (Sprint VPS-1)
# =============================================================================
# Snippet à inclure dans le server block 443 de nginx.conf
# Génère les certs via : make certbot-init
# Renouvelle via : make certbot-renew (cron systemd certbot.timer)
# =============================================================================

# Certs Let's Encrypt
ssl_certificate     /etc/letsencrypt/live/lyonflow/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/lyonflow/privkey.pem;

# TLS moderne uniquement (TLS 1.2 + 1.3)
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;

# Session cache + timeout
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP stapling
ssl_stapling        on;
ssl_stapling_verify on;

# HSTS (1 an, include subdomains)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Augmente la taille max body pour les uploads (déjà 100M dans nginx.conf mais reaffirmé ici)
client_max_body_size 100M;
